name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME=todo
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME=todo.exe
          fi

          VERSION=${GITHUB_REF_NAME}
          go build -ldflags="-s -w -X github.com/vivek/todod/cmd.Version=${VERSION}" \
            -trimpath -o "${BINARY_NAME}" .

      - name: Package
        run: |
          ARCHIVE_NAME=todo-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          mkdir -p dist

          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "dist/${ARCHIVE_NAME}.zip" todo.exe README.md LICENSE
          else
            tar czf "dist/${ARCHIVE_NAME}.tar.gz" todo README.md LICENSE
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
